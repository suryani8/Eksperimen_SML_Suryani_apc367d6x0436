name: Preprocessing Pipeline - Heart Disease UCI

on:
  push:
    branches:
      - main
    paths:
      - 'preprocessing/automate_Suryani.py'
      - 'heart_disease_uci.csv'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch:
    inputs:
      input_file:
        description: 'Nama file dataset raw (default: heart_disease_uci.csv)'
        required: false
        default: 'heart_disease_uci.csv'

jobs:
  preprocessing:
    name: Run Preprocessing Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Check Dataset
        run: |
          if [ ! -f "heart_disease_uci.csv" ]; then
            echo "ERROR: heart_disease_uci.csv tidak ditemukan!"
            exit 1
          else
            echo "Dataset ditemukan!"
            wc -l heart_disease_uci.csv
          fi

      - name: Run Preprocessing
        run: |
          cd preprocessing
          python automate_Suryani.py --input ../heart_disease_uci.csv

      - name: Verify Output Files
        run: |
          echo "=== Verifikasi Output ==="
          if [ -f "preprocessing/heart_preprocessing_train.csv" ]; then
            echo "heart_preprocessing_train.csv: OK"
          else
            echo "ERROR: heart_preprocessing_train.csv tidak ditemukan!"
            exit 1
          fi
          if [ -f "preprocessing/heart_preprocessing_test.csv" ]; then
            echo "heart_preprocessing_test.csv: OK"
          else
            echo "ERROR: heart_preprocessing_test.csv tidak ditemukan!"
            exit 1
          fi

      - name: Upload Preprocessed Data
        uses: actions/upload-artifact@v4
        with:
          name: heart-preprocessed-${{ github.run_number }}
          path: |
            preprocessing/heart_preprocessing_train.csv
            preprocessing/heart_preprocessing_test.csv
          retention-days: 7

      - name: Write Job Summary
        run: |
          echo "## Hasil Preprocessing Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| File | Jumlah Baris |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| heart_preprocessing_train.csv | $(wc -l < preprocessing/heart_preprocessing_train.csv) |" >> $GITHUB_STEP_SUMMARY
          echo "| heart_preprocessing_test.csv  | $(wc -l < preprocessing/heart_preprocessing_test.csv) |" >> $GITHUB_STEP_SUMMARY
          echo "Preprocessing selesai pada: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
